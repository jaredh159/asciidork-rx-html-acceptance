<div class="table-block">
  <table class="frame-all grid-all stretch">
    <colgroup>
      <col style="width: 50%" />
      <col style="width: 50%" />
    </colgroup>
    <thead>
      <tr>
        <th class="halign-left valign-top">Shortcut</th>
        <th class="halign-left valign-top">Purpose</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="halign-left valign-top"><kbd class="key">F11</kbd></td>
        <td class="halign-left valign-top">Toggle fullscreen</td>
      </tr>
      <tr>
        <td class="halign-left valign-top">
          <kbd class="keyseq"
            ><kbd class="key">Ctrl</kbd>+<kbd class="key">T</kbd></kbd
          >
        </td>
        <td class="halign-left valign-top">Open a new tab</td>
      </tr>
      <tr>
        <td class="halign-left valign-top">
          <kbd class="keyseq"
            ><kbd class="key">Ctrl</kbd>+<kbd class="key">Shift</kbd>+<kbd
              class="key"
              >N</kbd
            ></kbd
          >
        </td>
        <td class="halign-left valign-top">New incognito window</td>
      </tr>
      <tr>
        <td class="halign-left valign-top"><kbd class="key">\</kbd></td>
        <td class="halign-left valign-top">Used to escape characters</td>
      </tr>
      <tr>
        <td class="halign-left valign-top">
          <kbd class="keyseq"
            ><kbd class="key">Ctrl</kbd>+<kbd class="key">]</kbd></kbd
          >
        </td>
        <td class="halign-left valign-top">Jump to keyword</td>
      </tr>
      <tr>
        <td class="halign-left valign-top">
          <kbd class="keyseq"
            ><kbd class="key">Ctrl</kbd>+<kbd class="key">+</kbd></kbd
          >
        </td>
        <td class="halign-left valign-top">Increase zoom</td>
      </tr>
    </tbody>
  </table>
</div>
