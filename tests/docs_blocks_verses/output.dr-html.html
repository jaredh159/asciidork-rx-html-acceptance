<div class="verseblock">
  <pre class="content">
The fog comes
on little cat feet.

It sits looking
over harbor and city
on silent haunches
and then moves on.</pre
  >
  <div class="attribution">&#8212; Carl Sandburg<br /><cite>Fog</cite></div>
</div>
