<p>
  Press the <kbd class="button"><samp>OK</samp></kbd> button when you are
  finished.
</p>
<p>
  Select a file in the file navigator and click
  <kbd class="button"><samp>Open</samp></kbd
  >.
</p>
<p>
  To save the file, select
  <kbd class="menuseq"
    ><kbd class="menu"><samp>File</samp></kbd
    >&#160;<span class="caret">&#8250;</span>&#32;<kbd class="menu"
      ><samp>Save</samp></kbd
    ></kbd
  >.
</p>
<p>
  Select
  <kbd class="menuseq"
    ><kbd class="menu"><samp>View</samp></kbd
    >&#160;<span class="caret">&#8250;</span>&#32;<kbd class="menu"
      ><samp>Zoom</samp></kbd
    >&#160;<span class="caret">&#8250;</span>&#32;<kbd class="menu"
      ><samp>Reset</samp></kbd
    ></kbd
  >
  to reset the zoom level to the default setting.
</p>
