<div class="paragraph">
  <p>Press the <b class="button">OK</b> button when you are finished.</p>
</div>
<div class="paragraph">
  <p>
    Select a file in the file navigator and click <b class="button">Open</b>.
  </p>
</div>
<div class="paragraph">
  <p>
    To save the file, select
    <span class="menuseq"
      ><b class="menu">File</b>&#160;<b class="caret">&#8250;</b
      ><b class="menuitem">Save</b></span
    >.
  </p>
</div>
<div class="paragraph">
  <p>
    Select
    <span class="menuseq"
      ><b class="menu">View</b>&#160;<b class="caret">&#8250;</b
      ><b class="submenu">Zoom</b>&#160;<b class="caret">&#8250;</b
      ><b class="menuitem">Reset</b></span
    >
    to reset the zoom level to the default setting.
  </p>
</div>
